version: '2'
services:
  neuron-mysql:
    build:
      context: ./db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: '%'
      TZ: Asia/Shanghai
    restart: always
    container_name: neuron-mysql
    image: neuron-mysql
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --explicit_defaults_for_timestamp=true
      --lower_case_table_names=1
      --max_allowed_packet=128M
      --default-authentication-plugin=caching_sha2_password
    ports:
      - 13306:3306
    networks:
      - neuron-net

  neuron-redis:
    image: registry.cn-hangzhou.aliyuncs.com/jeecgdocker/redis:5.0
#    ports:
#      - 6379:6379
    restart: always
    hostname: neuron-redis
    container_name: neuron-redis
    networks:
      - neuron-net

  neuron-pgvector:
    image: registry.cn-hangzhou.aliyuncs.com/jeecgdocker/pgvector
    container_name: neuron-pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vector_db
#    ports:
#      - 5432:5432
    restart: always
    networks:
      - neuron-net

#  neuron-rabbitmq:
#    image: rabbitmq:3.7.7-management
##    ports:
##      - 5672:5672
##      - 15672:15672
#    restart: always
#    container_name: neuron-rabbitmq
#    hostname: neuron-rabbitmq
#    environment:
#      RABBITMQ_DEFAULT_USER: guest
#      RABBITMQ_DEFAULT_PASS: guest
#    networks:
#      - neuron-net

  neuron-system:
    build:
      context: ./neuron-system/neuron-system-start
    restart: on-failure
    mac_address: 02:42:ac:11:00:02
    depends_on:
      - neuron-mysql
      - neuron-redis
    container_name: neuron-system
    image: neuron-system
    hostname: neuron-system
    ports:
      - 8080:8080
    networks:
      - neuron-net
    volumes:
      - ./config:/neuron-system/config

networks:
  neuron-net:
    name: neuron_net
