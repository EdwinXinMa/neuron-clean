version: '3.8'

services:

  postgres:
    image: mirror.ccs.tencentyun.com/library/postgres:15-alpine
    container_name: neuron-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456                    # 改成 123456
      POSTGRES_DB: neuron_cloud                    # 改成 neuron_cloud
      TZ: Asia/Shanghai
    volumes:
      - /data/neuron/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d neuron_cloud"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: mirror.ccs.tencentyun.com/library/redis:7-alpine
    container_name: neuron-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    volumes:
      - /data/neuron/redis:/data
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: mirror.ccs.tencentyun.com/minio/minio:latest
    container_name: neuron-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: neuron
      MINIO_ROOT_PASSWORD: neuron123
      TZ: Asia/Shanghai
    volumes:
      - /data/neuron/minio:/data
    ports:
      - "9000:9000"
      - "9002:9002"
    command: server /data --console-address ":9002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: neuron-backend:latest
    container_name: neuron-backend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      # 数据库配置（和本地一致）
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_URL: "jdbc:postgresql://postgres:5432/neuron_cloud?stringtype=unspecified"
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_USERNAME: postgres
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_PASSWORD: 123456
      # Redis 配置
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # MinIO 配置（和本地一致）
      NEURON_UPLOADTYPE: minio
      NEURON_MINIO_MINIO_URL: "http://minio:9000"
      NEURON_MINIO_MINIO_NAME: neuron
      NEURON_MINIO_MINIO_PASS: neuron123
      NEURON_MINIO_BUCKETNAME: neuron-firmware
      # Redisson 配置
      NEURON_REDISSON_ADDRESS: "redis:6379"
    ports:
      - "8080:8080"
      - "9001:9001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - /data/neuron/logs:/app/logs
      - /data/neuron/uploads:/opt/upFiles

networks:
  default:
    name: neuron-net