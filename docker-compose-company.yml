version: '3.8'

services:

  postgres:
    image: crpi-q1gy3dzwbqy5vieg.cn-heyuan.personal.cr.aliyuncs.com/neuron-cloud/timescaledb:latest-pg16
    container_name: neuron-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: neuron_cloud
      TZ: Asia/Shanghai
    volumes:
      - /data/neuron/postgres:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d neuron_cloud"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: crpi-q1gy3dzwbqy5vieg.cn-heyuan.personal.cr.aliyuncs.com/neuron-cloud/redis:7-alpine
    container_name: neuron-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    volumes:
      - /data/neuron/redis:/data
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: crpi-q1gy3dzwbqy5vieg.cn-heyuan.personal.cr.aliyuncs.com/neuron-cloud/minio:latest
    container_name: neuron-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: neuron
      MINIO_ROOT_PASSWORD: neuron123
      TZ: Asia/Shanghai
    volumes:
      - /data/neuron/minio:/data
    ports:
      - "19000:9000"
      - "19002:9002"
    command: server /data --console-address ":9002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: crpi-q1gy3dzwbqy5vieg.cn-heyuan.personal.cr.aliyuncs.com/neuron-cloud/kafka:3.9.0
    container_name: neuron-kafka
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - /data/neuron/kafka:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5

  backend:
    image: neuron-backend:latest
    container_name: neuron-backend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      # 数据库 — 容器内网
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_URL: "jdbc:postgresql://postgres:5432/neuron_cloud?stringtype=unspecified"
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_USERNAME: postgres
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_PASSWORD: 123456
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # MinIO — 容器内网
      NEURON_UPLOADTYPE: minio
      NEURON_MINIO_MINIO_URL: "http://minio:9000"
      NEURON_MINIO_MINIO_NAME: neuron
      NEURON_MINIO_MINIO_PASS: neuron123
      NEURON_MINIO_BUCKETNAME: neuron-firmware
      # Redisson
      NEURON_REDISSON_ADDRESS: "redis:6379"
    ports:
      - "8180:8080"
      - "9101:9001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - /data/neuron/logs:/logs
      - /data/neuron/uploads:/opt/upFiles

  frontend:
    image: neuron-frontend:latest
    container_name: neuron-frontend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "10051:80"
    depends_on:
      - backend

networks:
  default:
    name: neuron-net
